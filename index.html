<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Modern personal CV and portfolio website for a frontend developer and UI/UX designer.">
  <meta name="keywords" content="CV, portfolio, frontend developer, UI UX designer, personal website">
  <meta name="author" content="Hegar Wijasena">
  <meta name="theme-color" content="#0f172a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hegar Wijasena - Personal Portfolio">
  <meta property="og:description" content="Modern CV and portfolio website.">
  <meta property="og:image" content="assets/images/profile.svg">
  <title>Hegar Wijasena - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>
  <a class="skip-link" href="#main" data-i18n="accessibility.skip"></a>

  <header class="site-header" id="siteHeader">
    <nav class="navbar container" aria-label="Primary navigation">
      <a class="brand" href="#hero" aria-label="Homepage">
        <span class="brand-mark" aria-hidden="true">HW</span>
        <span class="brand-text" data-i18n="brand"></span>
      </a>

      <button class="menu-toggle icon-button" id="menuToggle" type="button" aria-controls="navMenu" aria-expanded="false" data-aria-label-key="accessibility.menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-menu" id="navMenu">
        <ul class="nav-links">
          <li><a href="#hero" class="nav-link active" data-i18n="nav.home"></a></li>
          <li><a href="#about" class="nav-link" data-i18n="nav.about"></a></li>
          <li><a href="#skills" class="nav-link" data-i18n="nav.skills"></a></li>
          <li><a href="#experience" class="nav-link" data-i18n="nav.experience"></a></li>
          <li><a href="#projects" class="nav-link" data-i18n="nav.projects"></a></li>
          <li><a href="#contact" class="nav-link" data-i18n="nav.contact"></a></li>
        </ul>

        <div class="nav-actions">
          <div class="language-switch" aria-label="Language switcher">
            <button class="lang-btn active" type="button" data-lang="id">ID</button>
            <button class="lang-btn" type="button" data-lang="en">EN</button>
          </div>
          <button class="theme-toggle icon-button" id="themeToggle" type="button" data-aria-label-key="accessibility.theme">
            <span class="theme-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main id="main">
    <section class="hero section" id="hero" aria-labelledby="heroTitle">
      <canvas class="particle-canvas" id="particleCanvas" aria-hidden="true"></canvas>
      <div class="container hero-grid">
        <div class="hero-content reveal">
          <p class="eyebrow" data-i18n="hero.eyebrow"></p>
          <h1 id="heroTitle">
            <span data-i18n="hero.greeting"></span>
            <span class="gradient-text" data-i18n="hero.name"></span>
          </h1>
          <p class="hero-role">
            <span data-i18n="hero.rolePrefix"></span>
            <span class="typing-text" id="typingText" aria-live="polite"></span>
          </p>
          <p class="hero-copy" data-i18n="hero.tagline"></p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="assets/cv.pdf" download>
              <span data-i18n="hero.download"></span>
            </a>
            <a class="btn btn-secondary" href="#contact">
              <span data-i18n="hero.contact"></span>
            </a>
          </div>
          <div class="social-links" id="heroSocials" aria-label="Social links"></div>
        </div>

        <div class="hero-visual reveal">
          <div class="profile-frame">
            <img src="assets/images/profile.svg" alt="" data-alt-key="about.photoAlt" width="420" height="420" loading="eager">
          </div>
          <div class="metric-card metric-card-top">
            <span data-i18n="hero.metricOneValue"></span>
            <small data-i18n="hero.metricOneLabel"></small>
          </div>
          <div class="metric-card metric-card-bottom">
            <span data-i18n="hero.metricTwoValue"></span>
            <small data-i18n="hero.metricTwoLabel"></small>
          </div>
        </div>
      </div>
    </section>

    <section class="section about" id="about" aria-labelledby="aboutTitle">
      <div class="container split-layout">
        <div class="about-image reveal">
          <img src="assets/images/profile.svg" alt="" data-alt-key="about.photoAlt" width="520" height="520" loading="lazy">
        </div>
        <div class="section-content reveal">
          <p class="section-kicker" data-i18n="about.kicker"></p>
          <h2 id="aboutTitle" data-i18n="about.title"></h2>
          <p data-i18n="about.description"></p>
          <div class="quick-info" id="quickInfo"></div>
        </div>
      </div>
    </section>

    <section class="section skills" id="skills" aria-labelledby="skillsTitle">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" data-i18n="skills.kicker"></p>
          <h2 id="skillsTitle" data-i18n="skills.title"></h2>
          <p data-i18n="skills.subtitle"></p>
        </div>
        <div class="skills-grid" id="skillsGrid"></div>
      </div>
    </section>

    <section class="section timeline-section" id="experience" aria-labelledby="experienceTitle">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" data-i18n="experience.kicker"></p>
          <h2 id="experienceTitle" data-i18n="experience.title"></h2>
          <p data-i18n="experience.subtitle"></p>
        </div>
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section class="section projects" id="projects" aria-labelledby="projectsTitle">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" data-i18n="projects.kicker"></p>
          <h2 id="projectsTitle" data-i18n="projects.title"></h2>
          <p data-i18n="projects.subtitle"></p>
        </div>
        <div class="filter-bar" id="projectFilters" role="tablist" aria-label="Project filters"></div>
        <div class="project-grid" id="projectGrid"></div>
      </div>
    </section>

    <section class="section testimonials" id="testimonials" aria-labelledby="testimonialsTitle">
      <div class="container">
        <div class="section-heading reveal">
          <p class="section-kicker" data-i18n="testimonials.kicker"></p>
          <h2 id="testimonialsTitle" data-i18n="testimonials.title"></h2>
        </div>
        <div class="testimonial-shell reveal">
          <button class="slider-btn" id="prevTestimonial" type="button" data-aria-label-key="accessibility.previous">&lt;</button>
          <article class="testimonial-card" id="testimonialCard"></article>
          <button class="slider-btn" id="nextTestimonial" type="button" data-aria-label-key="accessibility.next">&gt;</button>
        </div>
      </div>
    </section>

    <section class="section contact" id="contact" aria-labelledby="contactTitle">
      <div class="container contact-grid">
        <div class="section-content reveal">
          <p class="section-kicker" data-i18n="contact.kicker"></p>
          <h2 id="contactTitle" data-i18n="contact.title"></h2>
          <p data-i18n="contact.subtitle"></p>
          <div class="contact-list" id="contactList"></div>
        </div>
        <form class="contact-form reveal" id="contactForm" novalidate>
          <div class="form-field">
            <label for="name" data-i18n="contact.form.name"></label>
            <input id="name" name="name" type="text" autocomplete="name" data-placeholder-key="contact.form.namePlaceholder" required>
            <small class="field-error" data-error-for="name"></small>
          </div>
          <div class="form-field">
            <label for="email" data-i18n="contact.form.email"></label>
            <input id="email" name="email" type="email" autocomplete="email" data-placeholder-key="contact.form.emailPlaceholder" required>
            <small class="field-error" data-error-for="email"></small>
          </div>
          <div class="form-field">
            <label for="message" data-i18n="contact.form.message"></label>
            <textarea id="message" name="message" rows="5" data-placeholder-key="contact.form.messagePlaceholder" required></textarea>
            <small class="field-error" data-error-for="message"></small>
          </div>
          <button class="btn btn-primary" type="submit" data-i18n="contact.form.submit"></button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <a class="brand" href="#hero" aria-label="Homepage">
          <span class="brand-mark" aria-hidden="true">HP</span>
          <span class="brand-text" data-i18n="brand"></span>
        </a>
        <p data-i18n="footer.tagline"></p>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="#about" data-i18n="nav.about"></a>
        <a href="#skills" data-i18n="nav.skills"></a>
        <a href="#projects" data-i18n="nav.projects"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>
      <div class="footer-socials" id="footerSocials"></div>
    </div>
    <p class="copyright" data-i18n="footer.copyright"></p>
  </footer>

  <div class="modal" id="projectModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <article class="modal-panel">
      <button class="modal-close icon-button" type="button" data-modal-close data-aria-label-key="accessibility.close">×</button>
      <img id="modalImage" src="" alt="" loading="lazy">
      <div class="modal-body">
        <p class="section-kicker" id="modalCategory"></p>
        <h3 id="modalTitle"></h3>
        <p id="modalDescription"></p>
        <div class="tech-list" id="modalTech"></div>
        <div class="modal-actions">
          <a class="btn btn-primary" id="modalLive" href="#" target="_blank" rel="noreferrer" data-i18n="projects.liveDemo"></a>
          <a class="btn btn-secondary" id="modalGithub" href="#" target="_blank" rel="noreferrer" data-i18n="projects.github"></a>
        </div>
      </div>
    </article>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
